body:
  text: 一一墝而立邑建城以城稱地以地稱稱也故𨑧可以守固戰勝戰勝於外福産於內焚焚産於無大而不咷關之細而不咳行廣故王者民之歸之如流水望故曰明於取天下若化國貧者能富之時不應者能應之土廣國不得毋富民衆而制則國不得毋治夫治且富之國車不發甲不出睪威天下故兵勝於朝廷勝於喪紀勝於土功勝於市井睪甲而勝主勝也陳而勝主勝也戰勝臣也戰再勝當一敗十萬之師出費日千金故百戰百勝不善者善善者善者也故善者成其刑而民勝而止出大矣一而天下并故患在百里之內者不起一日之師患在千里之內不起一月之師四海內者不起一歲之師戰勝其國則攻其國不攻其都戰勝天下不勝天下不攻其國故名將而無家絶苫俞根而無主左提鼓右慮枹而生焉故臨生不為死臨死不為生得帶甲十萬車千乘兵絶苫俞根不怒精不可事以財將之自治兆兆耳之生匆目之生明然使心狂者誰也難得之貨也使耳聾者誰也曰者誰也曰澤好色也耳聾及者羊腸亦勝鋸齒亦勝緣山入溪亦勝方亦勝圜亦勝遀亦勝兵重者如山之人如雲鯢復人閉關辭交而廷中之故所加兵者令聚者不得聚者不得迎迎者不得左者不得左知士不給慮甬士不木弩如羊角民人無昌于于者勝成去治而行必廣其處國可也無衝籠而攻無外不能成其勝大兵無創與鬼神勝議也故能戰勝小魚魚淵而禽其魚中魚魚國而禽其士大夫大魚魚天下而禽其萬國諸侯故大之注塞邪而食食發號出令不不殺夭台不膾不成之財少而歸之日不有虜將必有君十日不地利中失民請夫民飢者不得食者不得衣勞者不得息故舉兵而加之如春夏所加兵者如秋冬如喬如春如夏事二固以槫勝力分者弱心疑者北故進𨑧不稿從適不禽將吏士卒童靜如身心疑必北是故無嘗試發童必蚤畝凌而兵毋與戰矣心也羣下支節也其心童心童疑支節下不節童唯勝為幸不一不敗威立者勝凡將死其道者威在志位志位不代威乃愛者將之成者也是故兵不以名信信在孱兆是故衆聚不虛散兵出不徒亡人擊適若卜溺者囚險者毋戰心搕戰毋勝兵佻戰毋全氣凡俠議起爭私結怨貴以不得已起適貴先故事必當時必當於朝廷勝於喪紀勝於土功勝於市敗曲勝者其勝全雖不曲勝勝勸以明吾勝也兵勸三仁矢盡於郭中毀折入此令客氣數什百倍而主人氣不半者傷守甚者也然而世而守者不出出者不守守法丈人守一而當十十而當百百而當千萬城堅而厚士民衆篡薪食經徑矢仁矛戟策也攻者萬之衆乃稱其有必救之軍則有必必救之遇夫僮婦無不敝城盡資則固不尚鼓其藁桀俊雄堅甲利兵徑弩仁矢并於前則幼毀并於後五萬之誠必救關之其後出要塞擔擊其後毋通其量食中外相應四矢射之弗及罷囚之請不侍陳水楚請可畢其侍佰人之北照人之以得囚請則國士勝不宵自故今世千金不死百金不胥靡試聽臣之知不得關一言得用一朱今夫𣪠者小圉不下十數百數大圉不下千數故一人為不作今夫𣪠者大者父兄弟有在獄離其鄴賈無不離其宅士大夫無不離其官府者人之請也故兵策曰十萬之師出費日千金今申戍十萬之衆封內與天五償尊參會移民之具也均地分節傅斂臣主根也刑賞明省畏誅重姦止姦原正事之均也王之二術也柤豆同利制天下王者之德也明禮常䩗者之無事上無慶賞民無獄訟國無商賈成王至正也服奉下迵成王至德也
